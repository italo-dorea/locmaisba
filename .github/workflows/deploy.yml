name: Deploy Next.js to HostGator

on:
  push:
    branches:
      - main # O deploy acontecerá sempre que a branch main for atualizada
  workflow_dispatch: # Permite disparar manualmente via botão no GitHub
  repository_dispatch:
    types: [update-sheets] # Permite disparar via API (pelo Google Sheets)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Mesma versão do seu ambiente local ou superior

      - name: Install dependencies
        run: npm ci # Usa npm ci para instabilidades mais seguras usando package-lock.json

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_DEPLOY_TOKEN }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/ # Pasta onde o Next.js gera o site estático
          server-dir: ./
