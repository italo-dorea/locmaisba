name: Deploy Next.js to HostGator

on:
  push:
    branches:
      - main # O deploy acontecerá sempre que a branch main for atualizada
  workflow_dispatch: # Permite disparar manualmente via botão no GitHub
  repository_dispatch:
    types: [update-sheets] # Permite disparar via API (pelo Google Sheets)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Baixa o products.json e categories.json mais recentes da HostGator
      # para que o build use os dados atualizados pelo admin
      - name: Fetch live data from HostGator
        run: |
          curl -sf "${{ secrets.SITE_URL }}/api/products.json" -o public/api/products.json || echo "⚠️ Falha ao baixar products.json, usando versão do repo"
          curl -sf "${{ secrets.SITE_URL }}/api/categories.json" -o public/api/categories.json || echo "⚠️ Falha ao baixar categories.json, usando versão do repo"

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_DEPLOY_TOKEN }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./
          timeout: 600000 # 10 minutes timeout to prevent control socket drop on HostGator
          exclude: |
            imagens/upload/**
